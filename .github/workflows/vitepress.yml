name: VitePress

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write
  actions: write

concurrency:
  group: vitepress-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Docs tests
        run: npm run docs:test

      - name: Generate docs (section indexes, topic links, sidebar)
        run: npm run docs:prep

      - name: Documentation audit
        run: npm run docs:audit

      - name: Prune old action artifacts (keep 2 newest of each)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_COUNT: "2"
        run: |
          chmod +x scripts/prune-action-artifacts.sh
          ./scripts/prune-action-artifacts.sh docs-audit-report github-pages

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: docs-audit-report
          path: |
            docs-audit-report.json
            docs-audit-report.md
          retention-days: 7

      - name: Check links (non-blocking)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 8 --exclude-path .cursor --include-mail --exclude '^(http|https)://' -- './**/*.md'
        continue-on-error: true

      - name: Build VitePress site
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run docs:build

      - name: Disable Jekyll on GitHub Pages
        run: touch .vitepress/dist/.nojekyll

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.vitepress/dist
          cname: docs.f1y.ing
          force_orphan: true
