name: VitePress

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write

concurrency:
  group: vitepress-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Documentation audit
        run: npm run docs:audit

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: docs-audit-report
          path: |
            docs-audit-report.json
            docs-audit-report.md

      - name: Check links (non-blocking)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 8 --exclude-path .cursor --include-mail -- './**/*.md'
        continue-on-error: true

      - name: Build VitePress site
        run: npm run docs:build

      - name: Disable Jekyll on GitHub Pages
        run: touch .vitepress/dist/.nojekyll

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.vitepress/dist
          force_orphan: true
