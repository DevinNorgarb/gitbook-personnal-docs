name: mdBook

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write

concurrency:
  group: mdbook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.48"

      - name: Build
        run: mdbook build

      - name: Check links (non-blocking)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 8 --exclude-path .cursor --exclude-mail -- './**/*.md'
        continue-on-error: true

      - name: Disable Jekyll on Pages
        run: touch book/.nojekyll

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book
          force_orphan: true
